<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fotoğraf Yükle | oğuzhande</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Playfair Display', serif;
      background-color: #fcf8f2;
      color: #4a3b32;
      text-align: center;
      padding: 0;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: #ffffff;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(139, 90, 68, 0.1);
      max-width: 400px;
      width: 90%;
      border: 1px solid #eaddd3;
    }
    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 48px;
      color: #b06d51;
      margin: 0 0 5px 0;
      font-weight: normal;
    }
    h2 {
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #8c7668;
      margin-bottom: 25px;
      border-bottom: 1px solid #eaddd3;
      padding-bottom: 15px;
    }
    p {
      font-size: 15px;
      color: #6d5b51;
      line-height: 1.5;
      margin-bottom: 25px;
    }
    .custom-file-upload {
      border: 1px dashed #b06d51;
      display: block;
      padding: 20px;
      cursor: pointer;
      border-radius: 8px;
      background-color: #fcf8f2;
      transition: all 0.3s;
      margin-bottom: 20px;
    }
    .custom-file-upload:hover {
      background-color: #f7ede6;
    }
    input[type="file"] {
      display: none;
    }
    .file-icon {
      font-size: 24px;
      margin-bottom: 10px;
      display: block;
    }
    button {
      background-color: #b06d51;
      color: white;
      padding: 14px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-family: 'Playfair Display', serif;
      cursor: pointer;
      width: 100%;
      transition: background 0.3s;
    }
    button:disabled {
      background-color: #d8baa8;
      cursor: not-allowed;
    }
    #status {
      margin-top: 20px;
      font-weight: bold;
      color: #b06d51;
    }
    .selected-files {
      font-size: 13px;
      color: #8c7668;
      margin-bottom: 15px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>oğuzhande</h1>
    <h2>HANDE & OĞUZHAN</h2>
    <p>Çektiğiniz fotoğrafları buradan yükleyerek bizimle paylaşabilirsiniz. 🤎</p>
    
    <label class="custom-file-upload">
      <span class="file-icon">📸</span>
      <span id="file-label-text">Fotoğraf veya Video Seçmek İçin Dokunun</span>
      <input type="file" id="file" name="file" accept="image/*,video/*" multiple onchange="updateLabel()">
    </label>
    
    <div id="selected-files" class="selected-files"></div>
    <button id="btn" onclick="startUpload()">Yüklemeyi Başlat</button>
    <div id="status"></div>
  </div>

  <script>
    // 1. Adımda aldığınız YENİ Apps Script URL'sini buraya yapıştırın.
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw6UbLOb2QaBAlL1uiSaZLcYTLNPLqAQqZpJWPqxnIIXauHFwvSOoub4O6bZsLWSex9/exec";

    let filesList = [];
    let currentIndex = 0;

    function updateLabel() {
      const fileInput = document.getElementById('file');
      const labelText = document.getElementById('selected-files');
      if (fileInput.files.length > 0) {
        labelText.innerHTML = fileInput.files.length + " dosya seçildi.";
      }
    }

    function startUpload() {
      const fileInput = document.getElementById('file');
      filesList = fileInput.files;
      
      if (filesList.length === 0) {
        alert('Lütfen en az bir dosya seçin.');
        return;
      }
      
      document.getElementById('btn').disabled = true;
      currentIndex = 0;
      uploadNextFile();
    }

    function uploadNextFile() {
      if (currentIndex >= filesList.length) {
        document.getElementById('status').innerHTML = "✅ Tüm anılar başarıyla yüklendi! Teşekkür ederiz.";
        document.getElementById('btn').disabled = false;
        document.getElementById('btn').innerText = "Daha Fazla Yükle";
        document.getElementById('file').value = "";
        document.getElementById('selected-files').innerHTML = "";
        return;
      }

      const file = filesList[currentIndex];
      const reader = new FileReader();

      reader.onload = function(e) {
        // Base64 prefixini (data:image/jpeg;base64,) kesiyoruz
        const base64Data = e.target.result.split(",")[1];
        
        document.getElementById('status').innerHTML = `Yükleniyor... (${currentIndex + 1}/${filesList.length})`;

        const payload = {
          fileName: file.name,
          mimeType: file.type,
          base64: base64Data
        };

        // Vercel'den Google API'ye post isteği atıyoruz
        fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify(payload),
          // CORS preflight hatası almamak için text/plain kullanmak kritik bir detaydır
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          }
        })
        .then(response => response.json())
        .then(result => {
          if (result.status === 'success') {
            currentIndex++;
            uploadNextFile();
          } else {
            throw new Error(result.message);
          }
        })
        .catch(err => {
          document.getElementById('status').innerHTML = "❌ Hata oluştu. Lütfen tekrar deneyin.";
          document.getElementById('btn').disabled = false;
          console.error(err);
        });
      };
      
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
